name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip extension
        run: cd cartlens && zip -r ../cartlens-${{ github.ref_name }}.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: cartlens-${{ github.ref_name }}.zip
          generate_release_notes: true
